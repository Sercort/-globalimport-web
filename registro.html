<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <main class="form-container">
    <h1>Registro de Usuario</h1>
    <form id="registroForm">

      <!-- Sección A: Datos Personales -->
      <section class="form-section datos-personales">
        <h2>Datos Personales</h2>
        <label for="nombre">Nombre completo *</label>
        <input type="text" id="nombre" required>

        <label for="fecha">Fecha de nacimiento *</label>
        <input type="date" id="fecha" required>

        <label for="rut">RUT / Documento *</label>
        <input type="text" id="rut" required>

        <label for="genero">Género *</label>
        <select id="genero" required>
          <option value="">Seleccione...</option>
          <option>Masculino</option>
          <option>Femenino</option>
          <option>No binario</option>
          <option>Prefiero no decir</option>
        </select>

        <label for="nacionalidad">Nacionalidad *</label>
        <select id="nacionalidad" required>
          <option value="">Seleccione...</option>
          <option>Chile</option>
          <option>Argentina</option>
          <option>Perú</option>
          <option>Bolivia</option>
          <option>Brasil</option>
          <option>Colombia</option>
          <option>España</option>
          <option>México</option>
        </select>
      </section>

      <!-- Sección B: Contacto y Acceso -->
      <section class="form-section contacto-acceso">
        <h2>Contacto y Acceso</h2>
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" required>

        <label for="confirmEmail">Confirmar correo *</label>
        <input type="email" id="confirmEmail" required>

        <label for="password">Contraseña *</label>
        <input type="password" id="password" required>

        <label for="confirmPassword">Confirmar contraseña *</label>
        <input type="password" id="confirmPassword" required>

        <label for="telefono">Teléfono *</label>
        <input type="tel" id="telefono" placeholder="+56 9 1234 5678" required>
      </section>

      <!-- Sección C: Dirección de Entrega -->
      <section class="form-section direccion">
        <h2>Dirección de Entrega</h2>
        <label for="pais">País *</label>
        <select id="pais" required>
          <option value="">Seleccione...</option>
          <option>Chile</option>
          <option>Argentina</option>
          <option>Perú</option>
        </select>

        <label for="provincia">Provincia *</label>
        <input type="text" id="provincia" required>

        <label for="ciudad">Ciudad *</label>
        <input type="text" id="ciudad" required>

        <label for="calle">Calle y número *</label>
        <input type="text" id="calle" required>

        <label for="codigo">Código postal *</label>
        <input type="text" id="codigo" required>

        <label for="referencia">Referencia (opcional)</label>
        <textarea id="referencia" maxlength="200"></textarea>
      </section>

      <!-- Sección D: Preferencias y Términos -->
      <section class="form-section preferencias">
        <h2>Preferencias y Términos</h2>
        <p>Categorías de interés:</p>
        <label><input type="checkbox"> Electrónica</label>
        <label><input type="checkbox"> Indumentaria</label>
        <label><input type="checkbox"> Hogar</label>
        <label><input type="checkbox"> Otros</label>

        <p>Tipo de cliente:</p>
        <label><input type="radio" name="tipo"> Consumidor final</label>
        <label><input type="radio" name="tipo"> Revendedor</label>
        <label><input type="radio" name="tipo"> Empresa</label>

        <label for="conociste">¿Cómo nos conociste?</label>
        <select id="conociste">
          <option>Redes sociales</option>
          <option>Recomendación</option>
          <option>Búsqueda web</option>
          <option>Publicidad</option>
          <option>Otro</option>
        </select>

        <label><input type="checkbox" required> Acepto Términos y Condiciones</label>
        <label><input type="checkbox" required> Acepto Política de Privacidad</label>
      </section>

      <!-- Botones -->
      <div class="form-actions">
        <button type="submit">Registrarme</button>
        <button type="reset">Limpiar formulario</button>
        <p><a href="#">Ya tengo cuenta, iniciar sesión</a></p>
      </div>
    </form>
  </main>
</body>
</html>
